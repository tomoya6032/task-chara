#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  decay_character_stats:
    class: DecayCharacterStatsJob
    queue: default
    schedule: every hour

  check_event_reminders:
    class: CheckEventRemindersJob
    queue: default
    schedule: every minute

  send_daily_schedule_notifications:
    class: SendDailyScheduleNotificationsJob
    queue: default
    schedule: at 7am every day

  check_task_due_reminders:
    class: CheckTaskDueRemindersJob
    queue: default
    schedule: every minute
